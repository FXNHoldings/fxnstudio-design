<!doctype html>
<html lang="en-AU">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FXN Studio | Coming Soon</title>
  <meta name="description" content="FXN Studio is a Perth web design and development studio. Our new site is coming soon." />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/svg+xml" href="wp-content/themes/repurpose/img/favicon/favicon.svg">
  <link rel="icon" type="image/png" href="wp-content/themes/repurpose/img/favicon/favicon.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
      background: #0a0a0a;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      text-align: center;
      max-width: 560px;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #ffffff;
      margin-bottom: 3rem;
    }

    .logo span {
      color: #f05a28;
    }

    .badge {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #f05a28;
      border: 1px solid #f05a28;
      border-radius: 2rem;
      padding: 0.35rem 1rem;
      margin-bottom: 2rem;
    }

    h1 {
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 1.25rem;
      letter-spacing: -0.02em;
    }

    p {
      font-size: 1.1rem;
      line-height: 1.7;
      color: #a0a0a0;
      margin-bottom: 2.5rem;
    }

    .contact {
      font-size: 0.95rem;
      color: #666;
    }

    .contact a {
      color: #f05a28;
      text-decoration: none;
    }

    .contact a:hover {
      text-decoration: underline;
    }

    .divider {
      width: 48px;
      height: 3px;
      background: #f05a28;
      border: none;
      margin: 2.5rem auto;
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">FXN<span>.</span>Studio</div>
    <span class="badge">Under Construction</span>
    <h1>Something great<br>is on its way.</h1>
    <p>We're working hard on our new website.<br>Check back soon.</p>
    <hr class="divider">
    <p class="contact">
      In the meantime, reach us at<br>
      <a href="mailto:contact@fxnstudio.com">contact@fxnstudio.com</a>
    </p>
  </div>
</body>
</html>
